<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Creeper: Dimensions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: 'Press Start 2P', cursive; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background-color: #78A7FF; box-shadow: 0 0 30px rgba(0,0,0,0.9); image-rendering: pixelated; }
        .pixel-text-shadow { text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; }
        .pixel-text-shadow-sm { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        @keyframes flashText { 0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); } 50% { opacity: 0.8; transform: scale(1.15) rotate(2deg); } }
        @keyframes heartPulse { 0% { transform: scale(1.5); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .status-alert { animation: flashText 0.4s infinite; }
        .pointer-events-auto { pointer-events: auto; }
        
        .level-btn {
            background: rgba(0,0,0,0.8); border: 4px solid #555; padding: 12px; width: 100%; margin-bottom: 8px;
            color: white; font-family: 'Press Start 2P', cursive; text-align: left; cursor: pointer; transition: 0.2s;
        }
        .level-btn:hover:not(:disabled) { transform: scale(1.03); border-color: #4de04d; }
        .level-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #333; }
        .level-btn.unlocked { border-color: #FFD700; }
        .level-title { font-size: 11px; margin-bottom: 6px; color: #FFD700; }
        .level-goal { font-size: 8px; color: #aaa; }
        
        .tab-btn {
            font-family: 'Press Start 2P', cursive;
            transition: all 0.2s;
            cursor: pointer;
        }
        #levelListContainer::-webkit-scrollbar {
            width: 8px;
        }
        #levelListContainer::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        #levelListContainer::-webkit-scrollbar-thumb {
            background: #555;
            border: 2px solid #222;
        }
        .reset-btn {
            background: rgba(180, 20, 20, 0.85); border: 4px solid #aa2222; padding: 8px 16px; margin-top: 12px;
            color: white; font-family: 'Press Start 2P', cursive; font-size: 8px; cursor: pointer; transition: 0.2s;
        }
        .reset-btn:hover {
            transform: scale(1.05); background: rgba(220, 30, 30, 0.95); border-color: #ff3333;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- UI Overlay -->
    <div id="ui" class="ui-layer">
        
        <!-- Level Select Menu -->
        <div id="menuScreen" class="flex flex-col items-center justify-center text-center transition-opacity duration-300 bg-black/80 w-full h-full p-4 pointer-events-auto">
            <h1 class="text-3xl md:text-5xl text-green-400 pixel-text-shadow mb-8 tracking-widest leading-tight mt-4" style="animation: flashText 2s infinite;">FLAPPY<br>CREEPER</h1>
            
            <!-- Dynamic Level Selection Tabs -->
            <div class="w-full max-w-sm flex gap-1 mb-2 justify-around pointer-events-auto">
                <button id="tab0" class="tab-btn active border-b-4 border-green-500 text-green-400 text-[10px] py-2 px-1 flex-1 font-bold" onclick="switchTab(0)">OVERWORLD</button>
                <button id="tab1" class="tab-btn border-b-4 border-transparent text-gray-500 text-[10px] py-2 px-1 flex-1 font-bold" onclick="switchTab(1)">NETHER</button>
                <button id="tab2" class="tab-btn border-b-4 border-transparent text-gray-500 text-[10px] py-2 px-1 flex-1 font-bold" onclick="switchTab(2)">THE END</button>
            </div>

            <!-- Dynamic Level List Container -->
            <div id="levelListContainer" class="w-full max-w-sm flex flex-col gap-2 overflow-y-auto max-h-[220px] pointer-events-auto px-2">
                <!-- Level buttons will be injected here dynamically -->
            </div>

            <!-- Difficulty Select -->
            <div class="mt-4 flex flex-col items-center gap-1.5 pointer-events-auto w-full max-w-sm">
                <span class="text-white text-[9px] pixel-text-shadow tracking-widest text-yellow-400">DIFFICULTY</span>
                <div class="flex gap-1 w-full justify-around">
                    <button id="diff-simple" onclick="setDifficulty('simple')" class="flex-1 py-1.5 bg-gray-800 border-2 border-gray-600 hover:border-gray-400 text-white font-bold text-[7px] pixel-text-shadow rounded transition-transform active:scale-95 cursor-pointer">SIMPLE</button>
                    <button id="diff-easy" onclick="setDifficulty('easy')" class="flex-1 py-1.5 bg-gray-800 border-2 border-gray-600 hover:border-gray-400 text-white font-bold text-[7px] pixel-text-shadow rounded transition-transform active:scale-95 cursor-pointer">EASY</button>
                    <button id="diff-normal" onclick="setDifficulty('normal')" class="flex-1 py-1.5 bg-blue-700 border-2 border-blue-500 hover:border-blue-400 text-white font-bold text-[7px] pixel-text-shadow rounded transition-transform active:scale-95 cursor-pointer">NORMAL</button>
                    <button id="diff-hard" onclick="setDifficulty('hard')" class="flex-1 py-1.5 bg-gray-800 border-2 border-gray-600 hover:border-gray-400 text-white font-bold text-[7px] pixel-text-shadow rounded transition-transform active:scale-95 cursor-pointer">HARD</button>
                </div>
            </div>
            
            <div class="mt-8 text-white text-[10px] md:text-xs pixel-text-shadow max-w-sm bg-black/50 p-4 rounded border border-gray-600">
                <p class="mb-2 text-yellow-400">HOW TO PLAY:</p>
                Tap or Space to fly. Dodge pillars and enemies. Collect shiny items for points and epic power-ups!
            </div>
            
            <button id="resetProgressBtn" class="reset-btn pointer-events-auto" onclick="showResetProgressPrompt()">RESET PROGRESS</button>
        </div>

        <!-- Reset Progress Confirmation Prompt -->
        <div id="resetPromptScreen" class="absolute inset-0 bg-black/95 hidden flex-col items-center justify-center text-center p-6 z-30 pointer-events-auto">
            <div class="bg-gray-900 border-4 border-red-600 p-6 rounded max-w-sm flex flex-col items-center gap-6 shadow-2xl">
                <div class="text-red-500 text-sm md:text-md pixel-text-shadow leading-relaxed mb-2">
                    ARE YOU SURE YOU WANT TO<br>RESTART ALL YOUR PROGRESS?
                </div>
                <div class="text-gray-400 text-[8px] leading-normal mb-4 font-mono">
                    This will lock every level except Plains Level 1.
                </div>
                <div class="flex gap-4 w-full">
                    <button class="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white font-bold border-2 border-red-800 text-[10px] cursor-pointer transition-transform hover:scale-105 active:scale-95" onclick="confirmResetProgress()">YES</button>
                    <button class="flex-1 py-3 bg-gray-600 hover:bg-gray-700 text-white font-bold border-2 border-gray-800 text-[10px] cursor-pointer transition-transform hover:scale-105 active:scale-95" onclick="cancelResetProgress()">NO</button>
                </div>
            </div>
        </div>


        <!-- Pause UI -->
        <div id="pauseContainer" class="absolute top-4 right-4 flex items-center gap-2 hidden pointer-events-auto z-10">
            <span class="text-white/60 font-mono text-[9px] pixel-text-shadow select-none">use [P] to pause too!</span>
            <button onclick="togglePause()" class="w-8 h-8 bg-gray-800/80 hover:bg-gray-700/90 text-white font-bold border-2 border-gray-600 rounded flex items-center justify-center cursor-pointer transition-transform active:scale-95 text-xs select-none">
                <span id="pauseBtnIcon">II</span>
            </button>
        </div>

        <!-- In-Game HUD -->
        <div id="hud" class="absolute top-10 w-full flex flex-col items-center hidden pointer-events-none">
            <div class="flex gap-4 items-center">
                <div id="scoreDisplay" class="text-5xl text-white pixel-text-shadow transition-transform">0</div>
                <div class="text-xl text-gray-300 pixel-text-shadow">/ <span id="goalDisplay">20</span></div>
            </div>
            <!-- Boss Level Hearts -->
            <div id="bossLivesContainer" class="mt-2 flex gap-1 justify-center hidden"></div>
            <div id="statusContainer" class="mt-4 flex flex-col items-center gap-1">
                <div id="transformAlert" class="text-white text-sm pixel-text-shadow status-alert hidden">MODE ACTIVE</div>
            </div>
        </div>

        <!-- Game Over / Level Complete Screen -->

            <div class="bg-gray-900 border-4 border-gray-600 p-6 rounded shadow-lg flex flex-col items-center gap-4 mb-8">
                <div class="text-white text-lg pixel-text-shadow">SCORE</div>

            </div>

            <button onclick="goToMenu()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-8 border-b-4 border-green-800 hover:border-green-600 rounded text-xl pixel-text-shadow transition-all">
                MENU
            </button>
        </div>
    </div>
</div>

    let activeLevel = 0;

    let activeTab = 0;

    function switchTab(tabIndex) {
        activeTab = tabIndex;
        const tabs = [document.getElementById('tab0'), document.getElementById('tab1'), document.getElementById('tab2')];
        const colors = ['border-green-500 text-green-400', 'border-red-500 text-red-400', 'border-purple-500 text-purple-400'];
        
        tabs.forEach((tab, index) => {
            if (index === tabIndex) {
                tab.className = `tab-btn active border-b-4 ${colors[index]} text-[10px] py-2 px-1 flex-1 font-bold`;
            } else {
                tab.className = `tab-btn border-b-4 border-transparent text-gray-500 text-[10px] py-2 px-1 flex-1 font-bold`;
            }
        });
        
        renderLevels();
    }

    window.showResetProgressPrompt = function() {
        document.getElementById('resetPromptScreen').classList.remove('hidden');
        document.getElementById('resetPromptScreen').classList.add('flex');
    };

    window.cancelResetProgress = function() {
        document.getElementById('resetPromptScreen').classList.remove('flex');
        document.getElementById('resetPromptScreen').classList.add('hidden');
    };

    window.confirmResetProgress = function() {
        unlockedLevel = 0;
        localStorage.setItem('flappyCreeperUnlocked2', 0);
        localStorage.removeItem('enderDragonBeaten');
        updateMenuLocks();
        switchTab(0);
        cancelResetProgress();

        triggerShake(15, 6);
        flashAlpha = 0.8;
        effects.addExplosion(LOGICAL_WIDTH/2, LOGICAL_HEIGHT/2, ['#ff3333', '#aa2222', '#ffffff'], 30, 0.8, 0.05, true);
        effects.addText(LOGICAL_WIDTH/2, LOGICAL_HEIGHT/2 - 50, "PROGRESS WIPED!", "#ff3333");
    };

    function renderLevels() {
        const container = document.getElementById('levelListContainer');
        if (!container) return;
        container.innerHTML = '';
        
        const levelIndices = [];
        const startIndex = activeTab * 5;
        for (let i = startIndex; i < startIndex + 5; i++) {
            levelIndices.push(i);
        }

        if (activeTab === 0 && unlockedLevel >= 5) {
            levelIndices.push(15);
        }
        if (activeTab === 1 && unlockedLevel >= 10) {
            levelIndices.push(16);
        }
        if (activeTab === 2 && localStorage.getItem('enderDragonBeaten') === 'true') {
            levelIndices.push(17);
        }
        
        for (let idx = 0; idx < levelIndices.length; idx++) {
            const i = levelIndices[idx];
            const lvl = LEVELS[i];
            const isUnlocked = i >= 15 ? true : (i <= unlockedLevel);
            
            const btn = document.createElement('button');
            btn.className = `level-btn ${isUnlocked ? 'unlocked' : ''}`;
            btn.disabled = !isUnlocked;
            btn.onclick = () => startGame(i);
            
            let titleClass = 'text-white';
            if (activeTab === 0 && isUnlocked) titleClass = 'text-green-300';
            else if (activeTab === 1 && isUnlocked) titleClass = 'text-red-300';
            else if (activeTab === 2 && isUnlocked) titleClass = 'text-purple-300';
            
            if (i === 14 && isUnlocked && activeDifficulty !== 'simple') {
                btn.className = `level-btn unlocked border-pink-500 shadow-[0_0_15px_rgba(255,0,255,0.4)]`;
                titleClass = 'text-pink-400 font-bold';
            } else if (i >= 15 && isUnlocked) {
                btn.className = `level-btn unlocked border-yellow-500 shadow-[0_0_12px_rgba(255,215,0,0.3)]`;
                titleClass = 'text-yellow-400 font-bold';
            }
            
            const num = i >= 15 ? "BONUS" : ((i % 5) + 1);
            let titleText = `${num}. ${lvl.name.toUpperCase()}`;
            if (i === 14 && activeDifficulty !== 'simple') titleText += " [BOSS FIGHT]";
            
            let goalText = "";
            if (i === 14 && activeDifficulty !== 'simple') {

    function triggerShake(framesDur, intensity) { shakeFrames = framesDur; shakeIntensity = intensity; }

    function getGameSpeed() {
        if (typeof creeper !== 'undefined' && (creeper.isDying || creeper.exploded)) return 0;
        let levelMult = LEVELS[activeLevel].speedMult || 1.0;
        let difficultyMult = 1.0 + Math.min(1.5, score * 0.025);
        let speed = levelMult * difficultyMult;
        
        if (activeDifficulty === 'easy') speed *= 0.75;
        else if (activeDifficulty === 'hard') speed *= 1.25;
        
        if (creeper.slowMoTimer > 0) speed *= 0.45; 
        return speed;
    }

        // Win Condition Check

            triggerWin();

        scaleRatio = Math.min(window.innerWidth / LOGICAL_WIDTH, window.innerHeight / LOGICAL_HEIGHT);

    // ----------------------------------------------------
    // JUICE EFFECTS 
    // ----------------------------------------------------
    const effects = {
        particles: [], floatingTexts: [],
        addExplosion(x, y, colorPalette, amount, speedMult = 1, lifeDecay = 0.02, ignoreGravity = false) {
            for(let i=0; i<amount; i++) {
                this.particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 15 * speedMult, vy: (Math.random() - 0.5) * 15 * speedMult - (ignoreGravity ? 0 : 2),
                    size: Math.random() * 8 + 4, color: colorPalette[Math.floor(Math.random() * colorPalette.length)],
                    life: 1.0, decay: lifeDecay, ig: ignoreGravity
                });
            }
        },
        addText(x, y, text, color) { this.floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, vy: -1.5 }); },
        update() {
            let speed = getGameSpeed();
            let particleSpeed = speed;
            if (typeof creeper !== 'undefined' && (creeper.isDying || creeper.exploded)) {
                particleSpeed = 1.0;
            }
            for (let i = this.particles.length - 1; i >= 0; i--) {
                let p = this.particles[i]; p.x += p.vx * particleSpeed; p.y += p.vy * particleSpeed;
                if (!p.ig) p.vy += 0.2 * Math.max(1, particleSpeed); p.life -= p.decay * particleSpeed;
                if (p.life <= 0) this.particles.splice(i, 1);
            }
            for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
                let ft = this.floatingTexts[i]; ft.y += ft.vy * particleSpeed; ft.life -= 0.02 * particleSpeed;
                if (ft.life <= 0) this.floatingTexts.splice(i, 1);
            }
            if (flashAlpha > 0) flashAlpha -= 0.05 * particleSpeed;
        },
        draw() {
            this.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
            ctx.textAlign = 'center'; ctx.font = "12px 'Press Start 2P'";
            this.floatingTexts.forEach(ft => {
                ctx.globalAlpha = ft.life; ctx.fillStyle = '#000'; ctx.fillText(ft.text, ft.x+2, ft.y+2);
                ctx.fillStyle = ft.color; ctx.fillText(ft.text, ft.x, ft.y);
            });
            ctx.globalAlpha = 1.0;
        },
        reset() { this.particles = []; this.floatingTexts = []; flashAlpha = 0; }
    };

    // ----------------------------------------------------
    // PLAYER PROJECTILES (BLAZE MODE)
    // ----------------------------------------------------
    const playerProjectiles = {
        items: [],
        spawn(x, y) { this.items.push({ x: x, y: y, w: 12, h: 12, vx: 8 }); effects.addExplosion(x, y, ['#ffaa00', '#ffff00'], 5, 0.5, 0.1, true); },
        update() {
            if (currentState !== state.game) return;
            let speed = getGameSpeed();
            for (let i = this.items.length - 1; i >= 0; i--) {
                let p = this.items[i]; p.x += p.vx * speed;
                effects.addExplosion(p.x, p.y + 6, ['#ff4400', '#ffaa00'], 1, 0.2, 0.1, true);

                let hitSomething = false;
                enemies.items.forEach(e => {
                    if (!e.destroyed && p.x < e.x + e.w && p.x + p.w > e.x && p.y < e.y + e.h && p.y + p.h > e.y) {
                        e.destroyed = true; addScore(3); triggerShake(5, 4);
                        effects.addExplosion(e.x + e.w/2, e.y + e.h/2, ['#ff8800', '#ff0000', '#ffffff'], 20, 1);
                        effects.addText(e.x + e.w/2, e.y, "BURNT!", "#ff8800"); hitSomething = true;
                    }
                });

                pillars.items.forEach(pil => {
                    if (!pil.destroyed && p.x < pil.x + pillars.width && p.x + p.w > pil.x) {
                        if (p.y < pil.top || p.y + p.h > pil.bottom) {
                            pil.destroyed = true; addScore(2); triggerShake(8, 6);
                            let lvl = LEVELS[activeLevel].pillar;
                            effects.addExplosion(pil.x + pillars.width/2, p.y, [lvl.top, lvl.side, '#ffaa00'], 25, 1.2);
                            effects.addText(pil.x + pillars.width/2, p.y, "SMASH!", "#ffaa00"); hitSomething = true;
                        }
                    }

                    if (pil.crystal && !pil.crystal.destroyed && !hitSomething) {
                        let c = pil.crystal;
                        if (p.x < c.x + c.w && p.x + p.w > c.x && p.y < c.y + c.h && p.y + p.h > c.y) {
                            c.destroyed = true;
                            if (typeof enderDragon !== 'undefined') {
                                enderDragon.takeDamage(20);
                            }
                            effects.addExplosion(c.x + c.w/2, c.y + c.h/2, ['#ff00ff', '#ffffff', '#aa00ff'], 35, 1.2, 0.05, true);
                            effects.addText(c.x + c.w/2, c.y, "CRYSTAL BLAST!", "#ff00ff");
                            triggerShake(12, 8);
                            hitSomething = true;
                        }
                    }
                });

                if (activeLevel === 14 && typeof enderDragon !== 'undefined' && enderDragon.health > 0 && !hitSomething) {
                    if (p.x < enderDragon.x + enderDragon.w && p.x + p.w > enderDragon.x && p.y < enderDragon.y + enderDragon.h && p.y + p.h > enderDragon.y) {
                        enderDragon.takeDamage(1);
                        hitSomething = true;
                    }
                }

                if (hitSomething || p.x > LOGICAL_WIDTH) this.items.splice(i, 1);
            }
        },
        draw() { this.items.forEach(p => { ctx.fillStyle = '#ffaa00'; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = '#ffff00'; ctx.fillRect(p.x+2, p.y+2, p.w-4, p.h-4); }); },
        reset() { this.items = []; }
    };

    // ----------------------------------------------------
    // BACKGROUND & GROUND

    const bg = {
        clouds: [],
        init() {
            this.clouds = [];
            for(let i=0; i<8; i++) {
                this.clouds.push({ x: Math.random() * LOGICAL_WIDTH, y: Math.random() * (LOGICAL_HEIGHT / 2), w: 30 + Math.random() * 50, h: 10 + Math.random() * 15, speed: 0.1 + Math.random() * 0.3 });
            }
        },
        getSkyColor() {
            if (creeper.slowMoTimer > 0) return '#447799';

            if (lvlBg === 'overworld') {
                let cycle = Math.sin(gameFrames / 600); let lightness = 42.5 + cycle * 27.5; let hue = 215;
                if (cycle < 0 && cycle > -0.5) hue = 260; else if (cycle <= -0.5) hue = 230;
                return `hsl(${hue}, 100%, ${lightness}%)`;
            } else if (lvlBg === 'desert') {
                return '#e0b034';
            } else if (lvlBg === 'cave') {
                return '#2d3436';
            } else if (lvlBg === 'jungle') {
                return '#1e3d2f';
            } else if (lvlBg === 'stronghold') {

            } else if (lvlBg === 'nether') {
                return '#3a0909';
            } else if (lvlBg === 'soulsand') {
                return '#4a2c11';
            } else if (lvlBg === 'crimson') {

            } else if (lvlBg === 'warped') {

        draw() {
            ctx.fillStyle = this.getSkyColor(); ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            let type = LEVELS[activeLevel].cloudType;
            this.clouds.forEach(c => {
                if (type === 'fluffy') {
                    ctx.fillStyle = creeper.slowMoTimer > 0 ? 'rgba(200, 230, 255, 0.7)' : 'rgba(255, 255, 255, 0.7)';
                    ctx.fillRect(c.x, c.y, c.w, c.h); ctx.fillRect(c.x + 10, c.y - 10, c.w - 20, c.h + 20);
                } else if (type === 'ash') {
                    ctx.fillStyle = 'rgba(255, 100, 50, 0.2)';
                    ctx.fillRect(c.x, c.y, c.w, c.h/2);
                } else if (type === 'void') {
                    ctx.fillStyle = 'rgba(200, 50, 255, 0.15)';
                    ctx.fillRect(c.x, c.y, c.w/2, c.h*2);
                }
            });
        },
        update() {
            if (currentState !== state.game) return;
            let speed = getGameSpeed();
            this.clouds.forEach(c => {
                c.x -= c.speed * speed;
                if (c.x + c.w < 0) { c.x = LOGICAL_WIDTH; c.y = Math.random() * (LOGICAL_HEIGHT / 2); }

    const ground = {
        h: 80, y: LOGICAL_HEIGHT - 80, x: 0, dx: 3,
        draw() {
            let colors = LEVELS[activeLevel].ground;
            ctx.fillStyle = colors.side; ctx.fillRect(0, this.y, LOGICAL_WIDTH, this.h);
            ctx.fillStyle = colors.top; ctx.fillRect(0, this.y, LOGICAL_WIDTH, 15);

                for (let i = 15; i < this.h; i += 10) {

                    let offset = (Math.floor(i / 10) % 2 === 0 ? 0 : 10) + (this.x % 20);
                    for (let j = offset - 20; j < LOGICAL_WIDTH + 20; j += 20) {
                        ctx.fillRect(j, this.y + i, 2, 10);
                    }
                }
            } else {
                for(let i=0; i<this.h; i+=20) {
                    for(let j= -20; j<LOGICAL_WIDTH+20; j+=20) {
                        if ((i+(j-this.x))%60 === 0) ctx.fillRect(j + (this.x % 20), this.y + i + 15, 10, 10);

    // ----------------------------------------------------
    // PLAYER (CREEPER)
    // ----------------------------------------------------
    const creeper = {
        baseSize: 32, currentSize: 32, x: 80, y: 200, velocity: 0, gravityBase: 0.25, gravityActive: 0.25, jump: 5.5, rotation: 0, exploded: false,
        invincibleTimer: 0, shrinkTimer: 0, phaseTimer: 0, slowMoTimer: 0, transformTimer: 0, transform: 'none', isDying: false, dyingTimer: 0,
        isSwinging: false, swingAnchorX: 0, swingAnchorY: 0, swingR: 0,
        lives: 3, maxLives: 3,

        draw() {
            if (this.exploded) return;
            
            // Draw lead rope to ceiling anchor
            if (this.isSwinging) {
                ctx.save();
                ctx.strokeStyle = '#8b5a2b';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(this.x + this.currentSize/2, this.y + 4);
                ctx.lineTo(this.swingAnchorX, this.swingAnchorY);
                ctx.stroke();
                ctx.restore();
            }

            let s = this.currentSize; 
            if (this.isDying) {
                let swellFactor = 1.0 + (45 - this.dyingTimer) / 45 * 0.6;
                s *= swellFactor;
            }
            let cx = -s/2; let cy = -s/2;

            ctx.save(); ctx.translate(this.x + this.currentSize/2, this.y + this.currentSize/2); ctx.rotate(this.rotation);

            if (this.phaseTimer > 0) {
                let pulse = Math.abs(Math.sin(frames / 10)); ctx.globalAlpha = 0.4 + (pulse * 0.2);

                let leftAngle = (this.velocity > 0 ? Math.PI/4 : Math.PI/6) + Math.sin(frames*0.1) * 0.05;
                ctx.rotate(leftAngle);
                
                ctx.fillStyle = '#4a4a5a';
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-s * 0.4, s * 1.5);
                ctx.lineTo(-s * 0.9, s * 1.4);
                ctx.lineTo(-s * 0.8, s * 0.4);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#65657a';
                ctx.beginPath();
                ctx.moveTo(-2, 2);
                ctx.lineTo(-s * 0.38, s * 1.45);
                ctx.lineTo(-s * 0.85, s * 1.35);
                ctx.lineTo(-s * 0.76, s * 0.42);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // Right Elytra Wing
                ctx.save();
                ctx.translate(cx + s/2, cy + 4);
                let rightAngle = -(this.velocity > 0 ? Math.PI/4 : Math.PI/6) - Math.sin(frames*0.1) * 0.05;
                ctx.rotate(rightAngle);
                
                ctx.fillStyle = '#4a4a5a';
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(s * 0.4, s * 1.5);
                ctx.lineTo(s * 0.9, s * 1.4);
                ctx.lineTo(s * 0.8, s * 0.4);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#65657a';
                ctx.beginPath();
                ctx.moveTo(2, 2);
                ctx.lineTo(s * 0.38, s * 1.45);
                ctx.lineTo(s * 0.85, s * 1.35);
                ctx.lineTo(s * 0.76, s * 0.42);
                ctx.closePath();

                ctx.restore();
            } else {

                if (this.velocity < 0) flapAngle += Math.sin(frames) * 0.2;

            }

            let isGolden = this.invincibleTimer > 0 && !(this.invincibleTimer < 60 && frames % 10 < 5);

            else if (this.transform === 'slime') { ctx.fillStyle = '#55ff55'; ctx.fillRect(cx, cy, s, s); ctx.fillStyle = '#aaffaa'; ctx.fillRect(cx, cy, s/4, s/4); ctx.fillRect(cx+s/2, cy+s/4, s/4, s/4); } 
            else if (this.transform === 'elytra') {
                ctx.fillStyle = '#10c010'; ctx.fillRect(cx, cy, s, s); 
                ctx.fillStyle = '#14d814'; ctx.fillRect(cx, cy, s/4, s/4); ctx.fillRect(cx+s/2, cy+s/4, s/4, s/4);
                ctx.fillStyle = '#0b8e0b'; ctx.fillRect(cx+s*0.75, cy, s/4, s/4); ctx.fillRect(cx+s/4, cy+s*0.75, s/4, s/4);

                ctx.fillStyle = '#0b8e0b'; ctx.fillRect(cx+s*0.75, cy, s/4, s/4); ctx.fillRect(cx+s/4, cy+s*0.75, s/4, s/4);
            }

            if (this.phaseTimer > 0) { ctx.fillStyle = 'rgba(150, 0, 255, 0.3)'; ctx.fillRect(cx, cy, s, s); }

            ctx.fillStyle = '#000000'; let p = s / 8;
            ctx.fillRect(cx + p*1, cy + p*2, p*2, p*2); ctx.fillRect(cx + p*5, cy + p*2, p*2, p*2);

            if (isGolden) { ctx.strokeStyle = `rgba(255, 215, 0, ${Math.abs(Math.sin(frames/10))})`; ctx.lineWidth = 3; ctx.strokeRect(cx-2, cy-2, s+4, s+4); }

            if (activeLevel === 14 && this.invincibleTimer > 0 && Math.floor(frames / 4) % 2 === 0) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.45)';
                ctx.fillRect(cx - 2, cy - 2, s + 4, s + 4);
            }
            if (this.isDying) {
                let flashAlphaVal = Math.floor((45 - this.dyingTimer) / 4) % 2 === 0 ? 0.75 : 0.15;
                ctx.fillStyle = `rgba(255, 255, 255, ${flashAlphaVal})`;
                ctx.fillRect(cx - 2, cy - 2, s + 4, s + 4);
            }
            ctx.restore();
        },

        update() {
            if (this.exploded) return;

            if (this.isDying) {
                this.dyingTimer--;
                if (this.dyingTimer % 3 === 0) {
                    effects.addExplosion(
                        this.x + this.currentSize/2 + (Math.random() - 0.5) * 20,
                        this.y + this.currentSize/2 + (Math.random() - 0.5) * 20,
                        ['#ffffff', '#aaffaa', '#10c010'],
                        1, 0.3, 0.05, true
                    );
                }
                if (this.dyingTimer <= 0) {
                    this.triggerExplosion();
                }
                return;
            }

            if (this.invincibleTimer > 0) this.invincibleTimer--;
            if (this.phaseTimer > 0) this.phaseTimer--;
            if (this.slowMoTimer > 0) this.slowMoTimer--;
            
            if (this.shrinkTimer > 0) {
                this.shrinkTimer--; this.currentSize = 16; 
                if (this.shrinkTimer === 0) { this.currentSize = this.baseSize; this.y -= 8; }
            } else { this.currentSize = this.baseSize; }

            if (activeLevel === 14 && activeDifficulty !== 'simple') {
                this.transform = 'blaze';
                this.transformTimer = 999999;
            } else if (this.transformTimer > 0) {
                if (--this.transformTimer === 0) { this.transform = 'none'; transformAlert.classList.add('hidden'); }
            } else { this.transform = 'none'; }

            if (this.transform === 'elytra' && this.velocity > 0) this.gravityActive = this.gravityBase * 0.15; 
            else this.gravityActive = this.gravityBase;

            if (currentState === state.menu) {
                this.y = 200 + Math.cos(frames / 15) * 5; this.rotation = 0;
            } else {
                if (this.transform === 'swing') {
                    if (isInputActive) {
                        if (!this.isSwinging) {
                            this.isSwinging = true;
                            this.swingAnchorX = this.x + 35;
                            this.swingAnchorY = 0;
                            let dx = this.x - this.swingAnchorX;
                            let dy = this.y - this.swingAnchorY;
                            this.swingR = Math.sqrt(dx*dx + dy*dy);
                            playFlapSound();
                        }
                        
                        let scrollSpeed = getGameSpeed() * 3;
                        this.swingAnchorX -= scrollSpeed;
                        this.velocity += this.gravityActive;
                        
                        let vx = this.x - this.swingAnchorX;
                        let vy = this.y - this.swingAnchorY;
                        let len = Math.sqrt(vx*vx + vy*vy);
                        
                        if (len > 0) {
                            let nx = vx / len;
                            let ny = vy / len;
                            let tx = -ny;
                            let ty = nx;
                            
                            let dot = scrollSpeed * tx + this.velocity * ty;
                            let worldVy = dot * ty;
                            
                            this.x = this.swingAnchorX + nx * this.swingR;
                            this.y = this.swingAnchorY + ny * this.swingR;
                            this.velocity = worldVy;
                            this.velocity -= 0.08 * getGameSpeed();
                        }
                    } else {
                        this.isSwinging = false;
                        this.x += (80 - this.x) * 0.05 * getGameSpeed();
                        this.velocity += this.gravityActive;
                        this.y += this.velocity;
                    }
                } else {
                    this.isSwinging = false;
                    this.x += (80 - this.x) * 0.05 * getGameSpeed();
                    this.velocity += this.gravityActive;
                    this.y += this.velocity;
                }

                if (this.y < 0) { this.y = 0; this.velocity = 0; }
                if (this.y + this.currentSize >= ground.y) {
                    if (this.transform === 'slime') {
                        this.y = ground.y - this.currentSize; this.velocity = -this.jump * 1.4; 
                        addScore(1); triggerShake(8, 4);
                        effects.addExplosion(this.x + this.currentSize/2, ground.y, ['#55ff55', '#aaffaa'], 15, 0.8);
                        effects.addText(this.x + this.currentSize/2, this.y - 10, "BOING!", "#55ff55");
                    } else {
                        this.y = ground.y - this.currentSize; this.takeDamage();
                    }
                }
                
                if (this.isSwinging) {
                    let dx = this.x - this.swingAnchorX;
                    let dy = this.y - this.swingAnchorY;
                    this.rotation = Math.atan2(dy, dx) - Math.PI/2;
                } else if (this.velocity >= this.jump) {
                    this.rotation = Math.min(Math.PI / 4, this.rotation + 0.05);
                } else {
                    this.rotation = -Math.PI / 8;
                }
            }
        },

        flap() {
            if (this.isDying || this.exploded) {
                if (currentState === state.game) {
                    playFlapSound();
                    effects.addExplosion(this.x + this.currentSize/2, this.y + this.currentSize - 8, ['#ffffff', '#cccccc'], 3, 0.2, 0.05, false);
                }
                return;
            }
            this.velocity = -this.jump * (this.transform === 'elytra' ? 0.85 : 1);
            if (currentState === state.game) {
                playFlapSound();
                effects.addExplosion(this.x + this.currentSize/2, this.y + this.currentSize - 8, ['#ffffff', '#cccccc'], 3, 0.2, 0.05, false);
                if (this.transform === 'blaze') playerProjectiles.spawn(this.x + this.currentSize, this.y + this.currentSize/2 - 6);
            }
        },

        startDying() {
            if (this.isDying || this.exploded || currentState === state.over || currentState === state.win) return;
            document.getElementById('pauseContainer').classList.add('hidden');
            this.isDying = true;
            this.dyingTimer = 45;
            triggerShake(15, 3);
            playCreeperHiss();
        },

        triggerExplosion() {
            this.isDying = false;
            this.exploded = true;
            triggerShake(40, 25); flashAlpha = 1.0;
            effects.addExplosion(this.x + this.currentSize/2, this.y + this.currentSize/2, ['#ffffff', '#ffaa00', '#ff0000', '#444444', '#10c010'], 120, 2.5);
            playCreeperBoom();
            
            // Blow up all visible pillars on screen
            pillars.items.forEach(p => {
                if (!p.destroyed && p.x > -pillars.width && p.x < LOGICAL_WIDTH) {
                    p.destroyed = true;
                    let lvl = LEVELS[activeLevel].pillar;
                    effects.addExplosion(p.x + pillars.width/2, LOGICAL_HEIGHT/2, [lvl.top, lvl.side, '#ffaa00'], 30, 1.5);
                    effects.addText(p.x + pillars.width/2, LOGICAL_HEIGHT/2, "SMASH!", "#ffaa00");
                }
            });

            // Blow up all visible enemies on screen
            enemies.items.forEach(e => {
                if (!e.destroyed && e.x > -50 && e.x < LOGICAL_WIDTH) {
                    e.destroyed = true;
                    effects.addExplosion(e.x + e.w/2, e.y + e.h/2, ['#ff0000', '#ffaa00', '#ffffff'], 20, 1);
                    effects.addText(e.x + e.w/2, e.y, "BOOM!", "#ffaa00");
                }
            });

            // Blow up all visible power-ups on screen
            powerups.items.forEach(p => {
                if (!p.collected && p.x > -powerups.size && p.x < LOGICAL_WIDTH) {
                    p.collected = true;
                    effects.addExplosion(p.x + 12, p.y + 12, ['#ffffff', '#ffff00', '#ffaa00'], 15, 0.6, 0.08, true);
                    effects.addText(p.x + 12, p.y, "POP!", "#ffff00");
                }
            });

            setTimeout(() => {
                if (currentState === state.game || currentState === state.over) {
                    currentState = state.over;
                    hud.classList.add('hidden');
                    endScreen.classList.remove('hidden'); endScreen.classList.add('flex');
                    endTitle.innerText = "BOOM!"; endTitle.className = "text-4xl text-red-500 pixel-text-shadow mb-4 tracking-widest";
                    finalScoreEl.innerText = score;
                }
            }, 800);
        },

        triggerGameOver() {
            this.takeDamage();
        },

        takeDamage() {
            if (this.invincibleTimer > 0 || this.isDying || this.exploded) return;
            
            if (activeLevel === 14 && activeDifficulty !== 'simple') {
                this.lives--;
                updateBossLivesUI();
                triggerShake(12, 8);
                playHurtSound();
                
                effects.addExplosion(this.x + this.currentSize/2, this.y + this.currentSize/2, ['#ff0000', '#ff8888', '#ffffff'], 15, 0.7);
                effects.addText(this.x + this.currentSize/2, this.y - 10, "OOF!", "#ff3333");
                
                if (this.lives > 0) {
                    this.invincibleTimer = 90;
                    this.velocity = -this.jump * 0.8;
                    
                    if (this.y + this.currentSize >= ground.y) {
                        this.y = ground.y - this.currentSize - 30;
                    }
                    return;
                }
            }
            
            this.startDying();
        },

        getHitbox() {
            let padding = 4; return { left: this.x + padding, right: this.x + this.currentSize - padding, top: this.y + padding, bottom: this.y + this.currentSize - padding };
        },

        setTransform(type, name, colorClass) {
            this.transform = type; this.transformTimer = 480; 
            transformAlert.innerText = name; transformAlert.innerHTML = `<span class="${colorClass}">${name}</span>`; transformAlert.classList.remove('hidden');
        },

        reset() {
            this.x = 80; this.y = 200; this.velocity = 0; this.rotation = 0; this.exploded = false;
            this.isDying = false; this.dyingTimer = 0;
            this.invincibleTimer = 0; this.shrinkTimer = 0; this.transformTimer = 0; this.phaseTimer = 0; this.slowMoTimer = 0;
            this.transform = 'none'; this.currentSize = this.baseSize; this.gravityActive = this.gravityBase;
            this.isSwinging = false; this.swingAnchorX = 0; this.swingAnchorY = 0; this.swingR = 0;
            this.lives = (activeLevel === 14 && activeDifficulty !== 'simple') ? 3 : 1; this.maxLives = this.lives;
            transformAlert.classList.add('hidden');
            updateBossLivesUI();
        }
    };

    const enderDragon = {
        x: LOGICAL_WIDTH - 100, y: 150, w: 90, h: 60,

        targetY: 150,
        state: 'hover', // 'hover', 'swoop', 'dead'
        swoopTimer: 0,
        shootTimer: 0,
        deathTimer: 0,
        facingLeft: true,
        wingAngle: 0,
        hurtCooldown: 0,

        reset() {
            this.x = LOGICAL_WIDTH + 150; // spawn off-screen initially
            this.y = 150;
            this.health = 60;
            this.maxHealth = 60;
            this.targetY = 150;
            this.state = 'hover';
            this.swoopTimer = 0;
            this.shootTimer = 0;
            this.deathTimer = 0;
            this.hurtCooldown = 0;
        },

        update() {
            if (activeLevel !== 14 || currentState !== state.game) return;
            if (this.health <= 0) {
                this.state = 'dead';
                this.deathTimer++;
                if (this.deathTimer === 1) {
                    playExplosionSound();
                }
                if (this.deathTimer % 4 === 0) {
                    let rx = this.x + Math.random() * this.w;
                    let ry = this.y + Math.random() * this.h;
                    effects.addExplosion(rx, ry, ['#ffffff', '#aa00ff', '#440066', '#ff00ff'], 12, 0.8, 0.05, true);
                    triggerShake(5, 5);
                    playHitSound();
                }
                if (this.deathTimer >= 90) {
                    triggerWin();
                }
                return;
            }

            let speed = getGameSpeed();
            if (this.hurtCooldown > 0) {
                this.hurtCooldown -= speed;
            }

            if (this.state === 'hover') {
                if (this.x > LOGICAL_WIDTH - 110) {
                    this.x -= 1.5 * speed;
                } else {
                    this.x = LOGICAL_WIDTH - 110;
                }

                this.targetY = creeper.y + creeper.currentSize / 2 - this.h / 2;
                this.y += (this.targetY - this.y) * 0.03 * speed;
                this.y = Math.max(20, Math.min(LOGICAL_HEIGHT - ground.h - this.h - 20, this.y));

                this.shootTimer += speed;
                if (this.shootTimer >= 145) {
                    this.shootTimer = 0;
                    if (activeDifficulty !== 'simple') {
                        this.shootFireball();
                    }
                }

                this.swoopTimer += speed;
                if (this.swoopTimer >= 280) {
                    this.swoopTimer = 0;
                    if (Math.random() < 0.20 && this.x <= LOGICAL_WIDTH - 110) {
                        this.state = 'swoop';
                        this.swoopTimer = 0;
                    }
                }
            } else if (this.state === 'swoop') {
                this.swoopTimer += speed;
                if (this.swoopTimer < 60) {
                    this.x -= 7 * speed;
                    this.y += (creeper.y - this.y) * 0.1 * speed;
                }
                else if (this.swoopTimer < 120) {
                    this.x += 7 * speed;
                    this.y += (100 - this.y) * 0.05 * speed;
                }
                else {
                    this.state = 'hover';
                    this.swoopTimer = 0;
                    this.shootTimer = 0;
                }
            }

            this.wingAngle = Math.sin(gameFrames * 0.15) * (Math.PI / 4);

            let hasCrystal = false;
            pillars.items.forEach(p => {
                if (p.crystal && !p.crystal.destroyed && p.x > -pillars.width && p.x < LOGICAL_WIDTH) {
                    hasCrystal = true;
                }
            });
            if (hasCrystal && gameFrames % 10 < 0.1 * speed) {
                this.health = Math.min(this.maxHealth, this.health + 0.2);
            }

            if (this.health > 0 && !creeper.exploded && !creeper.isDying) {
                let hb = creeper.getHitbox();
                if (hb.right > this.x && hb.left < this.x + this.w && hb.bottom > this.y && hb.top < this.y + this.h) {
                    if (creeper.phaseTimer > 0) {
                    } else if (creeper.invincibleTimer > 0) {
                    } else {
                        creeper.takeDamage();
                    }
                }
            }
        },

        shootFireball() {
            if (currentState !== state.game || this.health <= 0) return;
            let angle = Math.atan2(
                (creeper.y + creeper.currentSize/2) - (this.y + this.h/2),
                (creeper.x + creeper.currentSize/2) - (this.x)
            );
            dragonProjectiles.spawn(this.x, this.y + this.h/2, angle);
            effects.addExplosion(this.x, this.y + this.h/2, ['#aa00ff', '#ff00ff'], 6, 0.4, 0.08, true);
        },

        takeDamage(amount) {
            if (this.health <= 0 || this.hurtCooldown > 0 || currentState !== state.game) return;
            this.health = Math.max(0, this.health - amount);
            this.hurtCooldown = 15;
            effects.addExplosion(this.x + this.w/2, this.y + this.h/2, ['#ffffff', '#ff00ff', '#5500aa'], 15, 0.8, 0.06, true);
            effects.addText(this.x + this.w/2, this.y, `-${amount}`, "#ff00ff");
            triggerShake(6, 4);
            playHitSound();
        },

        draw() {
            if (activeLevel !== 14 || currentState === state.menu) return;
            ctx.save();

            if (this.health <= 0) {
                ctx.globalAlpha = Math.max(0.2, 1.0 - (this.deathTimer / 90));
            }

            let cx = this.x + this.w/2;
            let cy = this.y + this.h/2;

            ctx.save();
            ctx.translate(cx + 15, cy - 10);
            ctx.rotate(-this.wingAngle);
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, -25, 45, 25);
            ctx.fillStyle = '#aa00ff';
            ctx.fillRect(5, -20, 35, 18);
            ctx.restore();

            ctx.fillStyle = '#111111';
            ctx.fillRect(this.x + this.w - 15, cy - 5, 25, 10);
            ctx.fillStyle = '#222222';
            ctx.fillRect(this.x + this.w + 10, cy - 8, 8, 16);

            ctx.fillStyle = '#151515';
            ctx.fillRect(this.x + 15, this.y + 10, 60, 40);
            ctx.fillStyle = '#252525';
            ctx.fillRect(this.x + 20, this.y + 15, 50, 10);

            ctx.fillStyle = '#111111';
            ctx.fillRect(this.x - 5, cy - 12, 20, 16);

            ctx.fillStyle = '#181818';
            ctx.fillRect(this.x - 20, cy - 22, 22, 20);
            ctx.fillStyle = '#111111';
            ctx.fillRect(this.x - 28, cy - 15, 10, 12);
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(this.x - 14, cy - 16, 4, 4);

            ctx.save();
            ctx.translate(cx - 15, cy - 10);
            ctx.rotate(this.wingAngle);
            ctx.fillStyle = '#181818';
            ctx.fillRect(-15, -30, 45, 30);
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(-10, -25, 35, 22);
            ctx.restore();

            if (this.hurtCooldown > 0) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                ctx.fillRect(this.x - 30, this.y - 15, this.w + 50, this.h + 25);
            }

            ctx.restore();

            this.drawHealthBar();
        },

        drawHealthBar() {
            let barW = 260;
            let barH = 14;
            let barX = LOGICAL_WIDTH / 2 - barW / 2;
            let barY = 22;

            ctx.fillStyle = '#222';
            ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX - 2, barY - 2, barW + 4, barH + 4);

            ctx.fillStyle = '#aa00ff';
            ctx.fillRect(barX, barY, barW * healthRatio, barH);
            
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 2;
            for (let i = 1; i < 10; i++) {
                let sx = barX + (barW / 10) * i;
                ctx.beginPath();
                ctx.moveTo(sx, barY);
                ctx.lineTo(sx, barY + barH);
                ctx.stroke();
            }

            ctx.textAlign = 'center';
            ctx.font = "8px 'Press Start 2P'";
            ctx.fillStyle = '#fff';
            ctx.fillText("ENDER DRAGON", LOGICAL_WIDTH / 2, barY - 6);
        }
    };

                    ctx.fillStyle = '#ffffff'; if (Math.floor(gameFrames) % 10 < 5) { ctx.fillRect(12, 2, 6, 4); ctx.fillRect(16, -2, 6, 4); } else { ctx.fillRect(12, 6, 6, 4); ctx.fillRect(16, 8, 6, 4); }

        update() {
            if (currentState !== state.game) return;
            let speed = getGameSpeed();

            this.items.forEach((e, i) => {
                // Use gameFrames for oscillating movement so it physically moves in slow motion
                if (e.type === 'bat') { 
                    e.x -= e.dx * speed; 
                    e.y = e.baseY + Math.sin((gameFrames + e.offset) / 25) * 40; 
                } 
                else if (e.type === 'fireball') { 
                    e.x -= e.dx * speed; 
                } 
                else if (e.type === 'phantom') { 
                    e.x -= e.dx * speed; 
                    let progress = (LOGICAL_WIDTH - e.x) / LOGICAL_WIDTH; 
                    if (progress < 0) progress = 0; if (progress > 1) progress = 1; 
                    e.y = e.baseY + Math.sin(progress * Math.PI) * e.swoopHeight; 
                } 
                else if (e.type === 'wither_skull') { 
                    e.x -= e.dx * speed;

                    if (e.y + e.h/2 > creeper.y + creeper.currentSize/2 + 10) e.y -= 1.2 * speed;

            if (type === 'bat') this.items.push({ type: 'bat', x: x, baseY: yZoneTop + (yZoneBottom - yZoneTop) / 2, y: 0, w: 28, h: 16, dx: 2.8, offset: Math.random() * 100, destroyed: false });

            else if (type === 'phantom') this.items.push({ type: 'phantom', x: x + 50, baseY: -20, swoopHeight: yZoneBottom + 20, y: -20, w: 32, h: 20, dx: 3.0, destroyed: false });

            else if (type === 'vex') this.items.push({ type: 'vex', x: x + 40, baseY: yZoneTop + (yZoneBottom - yZoneTop) / 2, y: 0, w: 20, h: 24, dx: 3.2, offset: Math.random() * 100, destroyed: false });

    // ----------------------------------------------------
    // OBSTACLES (PILLARS) & SPAWNER
    // ----------------------------------------------------
    const pillars = {
        items: [], width: 60, gap: 230, dx: 3, distanceCounter: 0, spawnDistance: 240, prevTopPos: 200,

        draw() {
            this.items.forEach(p => {
                if (p.destroyed) return;
                if (creeper.phaseTimer > 0) ctx.globalAlpha = 0.6;
                this.drawBlock(p.x, 0, this.width, p.top, true); 
                this.drawBlock(p.x, p.bottom, this.width, LOGICAL_HEIGHT - p.bottom - ground.h, false); 
                ctx.globalAlpha = 1.0;

                // Draw End Crystal sitting on the bottom pillar
                if (p.crystal && !p.crystal.destroyed) {
                    ctx.save();
                    ctx.translate(p.crystal.x + p.crystal.w/2, p.crystal.y + p.crystal.h/2);
                    ctx.rotate(p.crystal.rot);
                    
                    ctx.strokeStyle = '#ff00ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-p.crystal.w/2, -p.crystal.h/2, p.crystal.w, p.crystal.h);
                    
                    ctx.rotate(-p.crystal.rot * 2);
                    ctx.strokeStyle = '#ffffff';
                    ctx.strokeRect(-p.crystal.w/3, -p.crystal.h/3, p.crystal.w*2/3, p.crystal.h*2/3);

                    ctx.fillStyle = '#aa00ff';
                    ctx.fillRect(-4, -4, 8, 8);
                    ctx.restore();

                    // Draw a beam to the Ender Dragon (healing beam)
                    if (typeof enderDragon !== 'undefined' && enderDragon.health > 0 && enderDragon.state === 'hover') {
                        ctx.beginPath();
                        ctx.moveTo(p.crystal.x + p.crystal.w/2, p.crystal.y + p.crystal.h/2);
                        ctx.lineTo(enderDragon.x + enderDragon.w/2, enderDragon.y + enderDragon.h/2);
                        ctx.strokeStyle = `rgba(255, 0, 255, ${0.15 + Math.abs(Math.sin(frames/10))*0.25})`;
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 + Math.abs(Math.sin(frames/10))*0.3})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            });
        },

        drawBlock(x, y, w, h, isTop) {
            let colors = LEVELS[activeLevel].pillar;
            ctx.fillStyle = colors.side; ctx.fillRect(x, y, w, h);
            ctx.fillStyle = colors.detail;
            if (activeLevel === 16) {
                for (let i = 0; i < h; i += 10) {
                    ctx.fillRect(x, y + i, w, 2);
                    let offset = (Math.floor(i / 10) % 2 === 0 ? 0 : 10);
                    for (let j = offset; j < w; j += 20) {
                        ctx.fillRect(x + j, y + i, 2, 10);
                    }
                }
            } else {
                for(let i=0; i<h; i+=20) {
                    for(let j=0; j<w; j+=20) {
                        if ((i+j)%60 === 0) ctx.fillRect(x+j, y+i, 10, 10);
                    }
                }
            }
            ctx.fillStyle = colors.top;
            if (isTop) ctx.fillRect(x, y + h - 15, w, 15); else ctx.fillRect(x, y, w, 15);
        },

        update() {
            if (currentState !== state.game) return;
            let speed = getGameSpeed();
            
            let currentGap = LEVELS[activeLevel].pillarGap || 230;
            if (activeDifficulty === 'easy') currentGap += 20;
            else if (activeDifficulty === 'hard') currentGap -= 20;
            
            let currentSpawnDist = LEVELS[activeLevel].spawnDist || 240;
            if (activeDifficulty === 'simple') currentSpawnDist += 50;

            this.distanceCounter += this.dx * speed;
            if (this.distanceCounter >= currentSpawnDist) {
                this.distanceCounter = 0;
                let maxPos = ground.y - currentGap - 40; let minPos = 40;
                
                let topPos;
                if (activeDifficulty === 'simple') {
                    let maxDelta = 60;
                    let nextTop = Math.floor(Math.random() * (maxDelta * 2 + 1) - maxDelta) + this.prevTopPos;
                    topPos = Math.max(minPos, Math.min(maxPos, nextTop));
                } else {
                    topPos = Math.floor(Math.random() * (maxPos - minPos + 1) + minPos);
                }
                this.prevTopPos = topPos;
                let spawnX = LOGICAL_WIDTH;
                
                let newPillar = { x: spawnX, top: topPos, bottom: topPos + currentGap, passed: false, destroyed: false };
                if (activeLevel === 14 && activeDifficulty !== 'simple') {
                    newPillar.crystal = {
                        x: spawnX + this.width/2 - 12,
                        y: topPos + currentGap - 24,
                        w: 24,
                        h: 24,
                        destroyed: false,
                        rot: 0
                    };
                }
                this.items.push(newPillar);

                let spawnPowerupChance = LEVELS[activeLevel].powerupChance || 0.35;
                let spawnPowerup = activeDifficulty === 'simple' ? false : (Math.random() < spawnPowerupChance); 
                let enemyChance = 0.40;
                if (activeDifficulty === 'easy') enemyChance = 0.20;
                else if (activeDifficulty === 'hard') enemyChance = 0.55;
                else if (activeDifficulty === 'simple') enemyChance = 0.0;
                let spawnEnemy = activeLevel !== 14 && gameFrames > 150 && Math.random() < enemyChance; 

                if (spawnPowerup) {
                    let lvlPoints = LEVELS[activeLevel].points;
                    let pType = lvlPoints.small; let pRoll = Math.random();
                    if (pRoll < 0.08) pType = 'tnt'; else if (pRoll < 0.16) pType = lvlPoints.large;
                    else if (pRoll < 0.25) pType = 'slime'; else if (pRoll < 0.34) pType = 'elytra';
                    else if (pRoll < 0.43) pType = 'blaze'; else if (pRoll < 0.51) pType = 'chorus';
                    else if (pRoll < 0.59) pType = 'pearl'; else if (pRoll < 0.67) pType = 'clock';
                    else if (pRoll < 0.75) pType = 'swing';
                    else {
                        let appleMult = LEVELS[activeLevel].appleChanceMult || 1.0;
                        let appleThreshold = 0.75 + (0.08 * appleMult);
                        if (pRoll < Math.min(0.98, appleThreshold)) pType = 'apple';
                    }

                    powerups.items.push({ x: spawnX + this.width/2 - powerups.size/2, y: topPos + currentGap/2 - powerups.size/2, type: pType, collected: false });
                }
                if (spawnEnemy) enemies.spawn(spawnX + this.width + 30, topPos, topPos + currentGap);
            }

            this.items.forEach((p, i) => {
                p.x -= this.dx * speed;
                if (p.crystal) {
                    p.crystal.x = p.x + this.width/2 - p.crystal.w/2;
                    p.crystal.rot += 0.05 * speed;
                }
                if (!p.destroyed && !creeper.exploded) {
                    let hb = creeper.getHitbox();
                    if (hb.right > p.x && hb.left < p.x + this.width) {
                        if (hb.top < p.top || hb.bottom > p.bottom) {
                            if (creeper.phaseTimer > 0) { } 
                            else if (creeper.invincibleTimer > 0) {
                                p.destroyed = true; addScore(2); triggerShake(6, 6);
                                let lvl = LEVELS[activeLevel].pillar;
                                effects.addExplosion(p.x + this.width/2, creeper.y + creeper.currentSize/2, [lvl.top, lvl.side, '#4c9f38'], 35, 1.2);
                                effects.addText(p.x + this.width/2, creeper.y, "SMASH!", "#FFD700");
                            } else { creeper.takeDamage(); }
                        }
                    }
                }
                if (!p.destroyed && p.x + this.width < creeper.x && !p.passed) { addScore(1); p.passed = true; }
                if (p.x + this.width < 0) this.items.shift();
            });
        },
        reset() { this.items = []; this.distanceCounter = 0; this.prevTopPos = 200; }
    };

    // ----------------------------------------------------
    // WEB AUDIO API SYNTHESIZER (SOUNDS & SOUNDTRACK)
    // ----------------------------------------------------
    let audioCtx = null;
    let musicBeatTimer = 0;
    let musicNoteIndex = 0;
    
    const OVERWORLD_MUSIC = [293.66, 392.00, 440.00, 493.88, 440.00, 392.00, 293.66, 329.63, 392.00, 440.00, 392.00, 329.63];
    const NETHER_MUSIC = [261.63, 277.18, 293.66, 277.18, 220.00, 233.08, 246.94, 233.08];
    const END_MUSIC = [220.00, 246.94, 261.63, 293.66];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            ['click', 'keydown', 'touchstart'].forEach(type => {
                window.addEventListener(type, () => {
                    if (audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                });
            });
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playFlapSound() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(140, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(260, audioCtx.currentTime + 0.08);
        
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
    }

    function playScoreSound() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); // E5
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function playHitSound() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.15);
        
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }

    function playExplosionSound() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        let filter = audioCtx.createBiquadFilter();
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 0.4);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(300, audioCtx.currentTime);
        filter.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
        
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    function playCreeperHiss() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        let bufferSize = audioCtx.sampleRate * 0.75;
        let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        
        let noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        
        let filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(1200, now);
        
        let gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.01, now);
        gain.gain.linearRampToValueAtTime(0.35, now + 0.75);
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        noise.start(now);
    }

    function playCreeperBoom() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        
        let osc = audioCtx.createOscillator();
        let oscGain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.linearRampToValueAtTime(30, now + 0.08);
        
        oscGain.gain.setValueAtTime(1.5, now);
        oscGain.gain.linearRampToValueAtTime(0.001, now + 0.25);
        
        osc.connect(oscGain);
        oscGain.connect(audioCtx.destination);
        
        let bufferSize = audioCtx.sampleRate * 0.8;
        let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        
        let crackNode = audioCtx.createBufferSource();
        crackNode.buffer = buffer;
        
        let crackFilter = audioCtx.createBiquadFilter();
        crackFilter.type = 'lowpass';
        crackFilter.frequency.setValueAtTime(1800, now);
        
        let crackGain = audioCtx.createGain();
        crackGain.gain.setValueAtTime(1.8, now);
        crackGain.gain.linearRampToValueAtTime(0.001, now + 0.18);
        
        crackNode.connect(crackFilter);
        crackFilter.connect(crackGain);
        crackGain.connect(audioCtx.destination);
        
        let rumbleNode = audioCtx.createBufferSource();
        rumbleNode.buffer = buffer;
        
        let rumbleFilter = audioCtx.createBiquadFilter();
        rumbleFilter.type = 'lowpass';
        rumbleFilter.frequency.setValueAtTime(350, now);
        
        let rumbleGain = audioCtx.createGain();
        rumbleGain.gain.setValueAtTime(1.2, now);
        rumbleGain.gain.linearRampToValueAtTime(0.001, now + 0.65);
        
        rumbleNode.connect(rumbleFilter);
        rumbleFilter.connect(rumbleGain);
        rumbleGain.connect(audioCtx.destination);
        
        osc.start(now);
        osc.stop(now + 0.3);
        crackNode.start(now);
        rumbleNode.start(now);
    }

    function playSlimeSquishSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.12);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
    }

    function playHurtSound() {
        if (!audioCtx) return;
        try {
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(110, now);
            osc.frequency.exponentialRampToValueAtTime(55, now + 0.14);
            gain.gain.setValueAtTime(0.35, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.14);
            osc.start(now);
            osc.stop(now + 0.14);
        } catch(e) {}
    }

    function playPowerupSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        let notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
        notes.forEach((freq, index) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + index * 0.05);
            gain.gain.setValueAtTime(0.12, now + index * 0.05);
            gain.gain.linearRampToValueAtTime(0.01, now + index * 0.05 + 0.15);
            osc.start(now + index * 0.05);
            osc.stop(now + index * 0.05 + 0.15);
        });
    }

    function playWinSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        let notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, index) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + index * 0.07);
            gain.gain.setValueAtTime(0.15, now + index * 0.07);
            gain.gain.linearRampToValueAtTime(0.01, now + index * 0.07 + 0.2);
            osc.start(now + index * 0.07);
            osc.stop(now + index * 0.07 + 0.2);
        });
    }

    function playMusicNote(freq, type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        if (type === 'overworld') {
            osc.type = 'triangle';
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.24, audioCtx.currentTime + 0.04);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        } else if (type === 'nether') {
            osc.type = 'triangle';
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.20, audioCtx.currentTime + 0.04);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        } else {
            osc.type = 'square';
            gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
        }
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.45);
    }

    function updateSoundtrack() {
        if (currentState !== state.game) return;
        
        let progression = 0;
        if (activeLevel === 14 && typeof enderDragon !== 'undefined' && activeDifficulty !== 'simple') {
            progression = 1.0 - (enderDragon.health / enderDragon.maxHealth);
        } else {
            let winScore = LEVELS[activeLevel].winScore;
            progression = Math.min(1.0, score / winScore);
        }
        
        let beatInterval = Math.max(16, 45 - (progression * 29));
        
        let notes = END_MUSIC;
        let type = 'end';
        
        if (activeLevel < 5 || activeLevel === 15) {
            notes = OVERWORLD_MUSIC;
            type = 'overworld';
            beatInterval = Math.max(22, 60 - (progression * 38));
        } else if ((activeLevel >= 5 && activeLevel < 10) || activeLevel === 16) {
            notes = NETHER_MUSIC;
            type = 'nether';
            beatInterval = Math.max(20, 52 - (progression * 32));
        }
        
        musicBeatTimer += getGameSpeed();
        if (musicBeatTimer >= beatInterval) {
            musicBeatTimer = 0;
            playMusicNote(notes[musicNoteIndex], type);
            musicNoteIndex = (musicNoteIndex + 1) % notes.length;
        }
    }

    // ----------------------------------------------------
    // GAME LOOP & UI
    // ----------------------------------------------------
    function startGame(levelIndex) {
        let isLevelPlayable = false;
        if (levelIndex < 15) {
            isLevelPlayable = levelIndex <= unlockedLevel;
        } else if (levelIndex === 15) {
            isLevelPlayable = unlockedLevel >= 5;
        } else if (levelIndex === 16) {
            isLevelPlayable = unlockedLevel >= 10;
        } else if (levelIndex === 17) {
            isLevelPlayable = localStorage.getItem('enderDragonBeaten') === 'true';
        }

        if (!isLevelPlayable) return;

        initAudio();
        musicBeatTimer = 0;
        musicNoteIndex = 0;

        activeLevel = levelIndex;
        
        // Reset Everything
        isPaused = false;
        const pauseBtnIcon = document.getElementById('pauseBtnIcon');
        if (pauseBtnIcon) pauseBtnIcon.innerText = "II";
        document.getElementById('pauseContainer').classList.remove('hidden');

        creeper.reset(); pillars.reset(); powerups.reset(); enemies.reset(); effects.reset(); playerProjectiles.reset();
        if (activeLevel === 14 && activeDifficulty !== 'simple') {
            enderDragon.reset();
            dragonProjectiles.reset();
        }
        score = 0; scoreDisplay.innerText = score; frames = 0; gameFrames = 0;
        goalDisplay.innerText = LEVELS[activeLevel].winScore;
        
        if (activeLevel === 14) {
            scoreDisplay.parentElement.classList.add('hidden');
        } else {
            scoreDisplay.parentElement.classList.remove('hidden');
        }
        
        menuScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        
        bg.init();
        currentState = state.game;
        creeper.flap();
    }

    function triggerWin() {
        currentState = state.win;
        creeper.exploded = true; 
        playWinSound(); 
        
        if (activeLevel === unlockedLevel && unlockedLevel < 14) {
            unlockedLevel++;
            localStorage.setItem('flappyCreeperUnlocked2', unlockedLevel);
            updateMenuLocks();
        } else if (activeLevel === 14) {
            localStorage.setItem('enderDragonBeaten', 'true');
            updateMenuLocks();
        }

        document.getElementById('pauseContainer').classList.add('hidden');
        hud.classList.add('hidden');
        endScreen.classList.remove('hidden'); endScreen.classList.add('flex');
        endTitle.innerText = "LEVEL CLEARED!";
        endTitle.className = "text-3xl md:text-4xl text-green-400 pixel-text-shadow mb-4 tracking-widest";
        finalScoreEl.innerText = score;
    }

    function togglePause() {
        if (currentState !== state.game) return;
        isPaused = !isPaused;
        const pauseBtnIcon = document.getElementById('pauseBtnIcon');
        if (pauseBtnIcon) {
            pauseBtnIcon.innerText = isPaused ? "▶" : "II";
        }
    }

    function goToMenu() {
        isPaused = false;
        document.getElementById('pauseContainer').classList.add('hidden');
        endScreen.classList.add('hidden'); endScreen.classList.remove('flex');
        menuScreen.classList.remove('hidden');
        currentState = state.menu;
        switchTab(Math.floor(unlockedLevel / 5));
    }

    function handleInput() {
        if (currentState === state.game && !isPaused) creeper.flap();
    }

    let cheatBuffer = "";
    const CHEAT_CODE = "superbear1859yyyyy";

    window.addEventListener('keydown', (e) => {
        if ((e.key === 'p' || e.key === 'P') && currentState === state.game) {
            e.preventDefault();
            togglePause();
            return;
        }

        if ((e.code === 'Space' || e.code === 'ArrowUp') && currentState === state.game) {
            e.preventDefault();
            if (!isInputActive) {
                isInputActive = true;
                handleInput();
            }
            return;
        }

        if (currentState === state.menu && e.key && e.key.length === 1) {
            cheatBuffer += e.key.toLowerCase();
            if (cheatBuffer.length > CHEAT_CODE.length) {
                cheatBuffer = cheatBuffer.substring(cheatBuffer.length - CHEAT_CODE.length);
            }
            if (cheatBuffer === CHEAT_CODE) {
                cheatBuffer = "";
                unlockedLevel = 14;
                localStorage.setItem('flappyCreeperUnlocked2', 14);
                localStorage.setItem('enderDragonBeaten', 'true');
                switchTab(2);
                triggerShake(25, 10);
                flashAlpha = 1.0;
                effects.addExplosion(LOGICAL_WIDTH/2, LOGICAL_HEIGHT/2, ['#FFD700', '#ffffff', '#55ff55'], 40, 1.0, 0.03, true);
                effects.addText(LOGICAL_WIDTH/2, LOGICAL_HEIGHT/2 - 50, "CHEAT ACTIVATED!", "#FFD700");
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            isInputActive = false;
        }
    });

    const container = document.getElementById('game-container');
    container.addEventListener('mousedown', (e) => { 
        if (!e.target.closest('.pointer-events-auto') && currentState === state.game) {
            isInputActive = true;
            handleInput(); 
        }
    });
    window.addEventListener('mouseup', () => {
        isInputActive = false;
    });

    container.addEventListener('touchstart', (e) => { 
        if (!e.target.closest('.pointer-events-auto') && currentState === state.game) { 
            e.preventDefault(); 
            isInputActive = true;
            handleInput(); 
        } 
    }, { passive: false });
    window.addEventListener('touchend', () => {
        isInputActive = false;
    });

    function draw() {
        ctx.save(); 
        if (shakeFrames > 0) { ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity); }
        bg.draw(); pillars.draw(); powerups.draw(); enemies.draw(); playerProjectiles.draw();
        
        if (activeLevel === 14 && activeDifficulty !== 'simple') {
            enderDragon.draw();
            dragonProjectiles.draw();
        }

        ground.draw(); creeper.draw(); effects.draw();
        if (flashAlpha > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`; ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT); }
        
        if (isPaused && currentState === state.game) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '28px "Outfit", "Courier New", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#000000';
            ctx.shadowBlur = 6;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fillText("PAUSED", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2);
            ctx.shadowColor = 'transparent';
        }
        
        ctx.restore(); 
    }

    function update() {
        if (isPaused && currentState === state.game) return;
        
        if (currentState !== state.menu) {
            // Apply game time specifically for slow motion
            gameFrames += getGameSpeed();
            bg.update(); pillars.update(); powerups.update(); enemies.update(); playerProjectiles.update();
            
            if (activeLevel === 14 && activeDifficulty !== 'simple') {
                enderDragon.update();
                dragonProjectiles.update();
            }

            ground.update(); creeper.update(); effects.update();
            updateSoundtrack();
            updateBossLivesUI();
        } else {
            gameFrames++;
            bg.update(); ground.update(); creeper.update(); effects.update();
        }
        if (shakeFrames > 0) shakeFrames--;
        frames++; // Real time frames keep ticking (for UI & Player animations)
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    bg.init(); loop();

</script>
</body>
</html>
